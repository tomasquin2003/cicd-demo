version: "3.8"

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins-local
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cicd-network

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube-local
    ports:
      - "9000:9000"
    networks:
      - cicd-network

volumes:
  jenkins_home:

networks:
  cicd-network:
    driver: bridge